<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#09090f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>EVO App Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time" id="clock">09:41</span>
    <div class="icons">
      <!-- Signal -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="15" width="3" height="6" rx="1"/>
        <rect x="6" y="11" width="3" height="10" rx="1" opacity=".7"/>
        <rect x="11" y="7" width="3" height="14" rx="1" opacity=".5"/>
        <rect x="16" y="3" width="3" height="18" rx="1" opacity=".3"/>
      </svg>
      <!-- WiFi -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12.55a11 11 0 0 1 14.08 0" opacity=".4"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0" opacity=".2"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1.5"/>
      </svg>
      <!-- Battery -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="7" width="18" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="3.5" y="8.5" width="13" height="7" rx="1"/>
        <path d="M20 11v2a2 2 0 0 0 0-2z"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-top fade-in-up">
      <div class="logo-mark">
        <div class="logo-icon">
          <!-- Lightning bolt logo -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L4.09 12.97A1 1 0 0 0 5 14.5h6l-2 7.5L19.91 11A1 1 0 0 0 19 9.5h-6L13 2z"/>
          </svg>
        </div>
        <span class="logo-text">EVO APP STORE</span>
      </div>
      <div class="header-avatar">⚡</div>
    </div>

    <!-- Search -->
    <div class="search-bar fade-in-up" style="animation-delay:.08s">
      <div class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <input type="text" id="search-input" class="search-input" placeholder="Buscar apps…" autocomplete="off" />
      <button id="search-clear" class="search-clear" aria-label="Limpar busca">✕</button>
    </div>
  </header>

  <!-- Tabs -->
  <div id="tabs" class="tabs"></div>

  <div class="content-pad">

    <!-- Featured Section -->
    <section class="featured-section" id="featured-section">
      <div class="section-title">
        Em Destaque
        <span class="section-sub">Selecionados para você</span>
      </div>
      <div class="carousel" id="carousel">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- All Apps Section -->
    <section class="apps-section">
      <div class="section-title">
        Todos os Apps
        <span class="section-sub" id="apps-count"></span>
      </div>
      <div class="app-list" id="app-list">
        <!-- Populated by JS -->
      </div>

      <!-- No results -->
      <div class="no-results" id="no-results">
        <div class="no-results-icon">🔍</div>
        <div class="no-results-title">Nada encontrado</div>
        <div class="no-results-sub">Tente outro termo de busca</div>
      </div>
    </section>

  </div><!-- /content-pad -->

  <!-- Bottom Nav -->
  <nav class="nav-bar">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.55 5.45 21 6 21H9M19 10L21 12M19 10V20C19 20.55 18.55 21 18 21H15M9 21V15C9 14.45 9.45 14 10 14H14C14.55 14 15 14.45 15 15V21M9 21H15"/>
      </svg>
      <span class="nav-label">Início</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav-label">Categorias</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
        <polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/>
      </svg>
      <span class="nav-label">Atualizações</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Perfil</span>
    </div>
  </nav>

</div><!-- /app -->

<!-- ── Detail Modal ── -->
<div class="modal-overlay" id="modal-overlay"></div>
<div class="modal-sheet" id="modal-sheet">
  <div class="modal-handle"></div>
  <button id="close-modal" style="position:absolute;top:16px;right:20px;background:rgba(139,92,246,.12);border:1.5px solid rgba(139,92,246,.25);color:#a78bfa;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">✕</button>

  <div class="modal-header">
    <img id="modal-logo" class="modal-logo" src="" alt="">
    <div class="modal-meta">
      <div id="modal-app-name" class="modal-app-name"></div>
      <div id="modal-developer" class="modal-developer"></div>
      <span id="modal-category" class="modal-category"></span>
    </div>
  </div>

  <div class="modal-stats">
    <div class="stat-item">
      <div class="stat-value" id="modal-rating">—</div>
      <div class="stat-label">★ Avaliação</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="modal-reviews">—</div>
      <div class="stat-label">Avaliações</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="modal-size">—</div>
      <div class="stat-label">Tamanho</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="modal-version">—</div>
      <div class="stat-label">Versão</div>
    </div>
  </div>

  <div class="modal-desc" id="modal-desc"></div>

  <div style="padding:0 24px 8px;font-size:12px;color:#6b6480;">
    Requer: <span id="modal-android" style="color:#a78bfa;font-weight:500;"></span>
  </div>

  <div class="modal-tags-row" id="modal-tags"></div>

  <button class="modal-install-btn" id="modal-install-btn">
    ⬇ Instalar APK
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon">🚀</span>
  <span class="toast-msg">Instalando…</span>
</div>

<script src="App.js"></script>
</body>
</html>
